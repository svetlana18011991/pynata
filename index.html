<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка размера и положения</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* Запрет выделения текста при перетаскивании */
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('bg (2).png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #piniata-wrapper {
            position: absolute;
            width: 250px; /* Стартовый размер */
            cursor: grab;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%); /* Центрирование */
            z-index: 10;
        }

        #piniata-wrapper:active {
            cursor: grabbing;
        }

        .piniata-image {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        /* Панель инструкций и кнопок изменения размера */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 12px;
            z-index: 90;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .controls p {
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
        }

        .resize-btn {
            font-size: 24px;
            font-weight: bold;
            width: 45px;
            height: 45px;
            margin: 0 5px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #ff7e67;
            color: white;
            transition: 0.1s;
        }

        .resize-btn:hover { background: #ff5a3d; }
        .resize-btn:active { transform: scale(0.95); }

        /* Окно вывода координат */
        #coord-output {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            padding: 30px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 20px;
            display: none;
            z-index: 100;
            border: 2px solid #00ff00;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div class="controls">
        <p>1. Перетащите пиньяту</p>
        <p>2. Настройте размер:</p>
        <div>
            <button id="btn-minus" class="resize-btn">-</button>
            <button id="btn-plus" class="resize-btn">+</button>
        </div>
        <p>3. Нажмите <b>Enter</b></p>
    </div>
    
    <div id="coord-output"></div>

    <div id="piniata-wrapper">
        <img class="piniata-image" src="1.png" alt="Пиньята">
    </div>

</div>

<script>
    const piniataWrapper = document.getElementById('piniata-wrapper');
    const coordOutput = document.getElementById('coord-output');
    
    // --- НАСТРОЙКА РАЗМЕРА ---
    let currentWidth = 250; // Стартовая ширина в пикселях
    const step = 10; // На сколько пикселей менять размер за один клик

    document.getElementById('btn-plus').addEventListener('click', () => {
        currentWidth += step;
        piniataWrapper.style.width = currentWidth + 'px';
    });

    document.getElementById('btn-minus').addEventListener('click', () => {
        if (currentWidth > 50) { // Не даем сделать пиньяту слишком маленькой
            currentWidth -= step;
            piniataWrapper.style.width = currentWidth + 'px';
        }
    });


    // --- ПЕРЕТАСКИВАНИЕ ---
    let isDragging = false;
    let startX, startY, initialLeft, initialTop;

    piniataWrapper.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        
        const rect = piniataWrapper.getBoundingClientRect();
        initialLeft = rect.left + rect.width / 2;
        initialTop = rect.top + rect.height / 2;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        
        piniataWrapper.style.left = `${initialLeft + dx}px`;
        piniataWrapper.style.top = `${initialTop + dy}px`;
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
    });


    // --- ФИКСАЦИЯ И ВЫВОД РЕЗУЛЬТАТА ПО ENTER ---
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const rect = piniataWrapper.getBoundingClientRect();
            const parentRect = document.getElementById('game-container').getBoundingClientRect();

            // Считаем координаты центра в процентах
            const leftPerc = ((rect.left + rect.width / 2) / parentRect.width * 100).toFixed(2);
            const topPerc = ((rect.top + rect.height / 2) / parentRect.height * 100).toFixed(2);

            // Формируем итоговую строку
            const resultString = `left: '${leftPerc}%', top: '${topPerc}%', width: '${currentWidth}px'`;

            coordOutput.innerHTML = `<b>Готово!</b><br><br><span style="color:#fff;">${resultString}</span><br><br>Скопируйте текст белого цвета и отправьте сюда.`;
            coordOutput.style.display = 'block';
        }
    });
</script>

</body>
</html>

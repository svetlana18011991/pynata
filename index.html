<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Пиньята — PRO Редактор</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Neucha&display=swap');
    
    html, body { height: 100%; margin: 0; overflow: hidden; background: #0f121b; color: #eaf0ff; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    * { box-sizing: border-box; }
    
    :root {
      --neon: #d6b14a;
      --bg-panel: rgba(20, 24, 35, 0.95);
      --border: rgba(255, 255, 255, 0.1);
      --danger: #ff4d4d;
      --ok: #2dd27d;
    }

    button { cursor: pointer; border: none; font-weight: 600; border-radius: 8px; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    .btn-primary { background: var(--neon); color: #000; padding: 10px 16px; }
    .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 15px rgba(214,177,74,0.4); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px 12px; }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }
    .btn-danger { color: var(--danger); border-color: rgba(255,77,77,0.3); }
    .btn-danger:hover { background: rgba(255,77,77,0.1); }

    input, textarea, select { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; padding: 10px 14px; border-radius: 8px; outline: none; font-family: inherit; }
    input:focus, textarea:focus, select:focus { border-color: var(--neon); background: rgba(0,0,0,0.5); }
    select { appearance: none; cursor: pointer; }

    /* LAYOUT */
    #app { display: flex; height: 100vh; width: 100vw; }
    
    /* LEFT PANEL */
    .panel { width: 450px; background: var(--bg-panel); display: flex; flex-direction: column; border-right: 1px solid var(--border); z-index: 10; box-shadow: 5px 0 25px rgba(0,0,0,0.5); }
    .panel-hdr { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 15px; }
    .panel-hdr-left { display: flex; align-items: center; gap: 15px; }
    .panel-hdr img { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; background: rgba(255,255,255,0.05); }
    .panel-hdr h1 { margin: 0; font-size: 18px; }
    .panel-hdr span { font-size: 12px; color: var(--neon); }
    
    .panel-content { flex: 1; overflow-y: auto; padding: 20px; }
    .panel-footer { padding: 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 10px; }
    
    .section { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    .section-title { font-size: 14px; font-weight: 700; color: var(--neon); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 13px; color: #a9b6e6; margin-bottom: 6px; }

    /* QUESTION LIST (ИСПРАВЛЕНО НАЛЕЗАНИЕ КАРАНДАША) */
    .q-item { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
    .q-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
    .q-item-title { flex: 1; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .q-item-actions { flex-shrink: 0; display: flex; gap: 5px; }
    .q-item-actions button { padding: 6px; font-size: 12px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: #161925; width: 700px; max-height: 90vh; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow2); display: flex; flex-direction: column; }
    .modal-hdr { padding: 20px 24px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 24px; overflow-y: auto; display: flex; gap: 20px; }
    .modal-col { flex: 1; display: flex; flex-direction: column; gap: 15px; }
    .modal-ftr { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); border-radius: 0 0 20px 20px; }
    
    .opt-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .opt-row input[type="radio"] { width: 18px; height: 18px; accent-color: var(--ok); cursor: pointer; flex-shrink: 0; }
    
    .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .color-row label { font-size: 13px; color: #a9b6e6; }
    .color-row input[type="color"] { width: 40px; height: 30px; padding: 0; cursor: pointer; border: none; border-radius: 4px; }
    .color-row input[type="number"] { width: 70px; padding: 6px; }
    .color-row select { width: 120px; padding: 6px; }

    /* RIGHT PANEL (ИСПРАВЛЕНО ПРЕВЬЮ 16:9) */
    .preview { flex: 1; background: #1a1e29; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
    .preview-wrapper { width: 100%; max-width: calc(100vh * 1.6); aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.05); position: relative; }
    .preview-badge { position: absolute; top: -35px; left: 0; background: rgba(214,177,74,0.15); padding: 6px 15px; border-radius: 6px; font-size: 12px; font-weight: bold; color: var(--neon); border: 1px solid rgba(214,177,74,0.3); pointer-events: none; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    .export-box { display: flex; gap: 10px; align-items: center; }
    .export-box input { flex: 1; font-family: monospace; color: var(--ok); }
  </style>
</head>
<body>

<div id="app">
  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-hdr-left">
        <img src="logo.png" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' fill=\'%23d6b14a\' viewBox=\'0 0 24 24\'><path d=\'M12 2L2 22h20L12 2z\'/></svg>'">
        <div>
          <span>Светлана Быкова</span>
          <h1 id="uiTitleText">Пиньята</h1>
        </div>
      </div>
    </div>
    
    <div class="panel-content">
      <div class="section">
        <div class="section-title">Основное</div>
        <div class="field">
          <label>Название игры</label>
          <input type="text" id="inpTitle" value="Праздничная Пиньята" oninput="saveAll()">
        </div>
        <div class="field">
          <label>Инструкция (Стартовый экран)</label>
          <textarea id="inpInst" rows="2" oninput="saveAll()">Ответь на 5 вопросов правильно, чтобы разбить пиньяту и получить сюрприз!</textarea>
        </div>
        <div class="field">
          <label>Текст при победе</label>
          <input type="text" id="inpWin" value="Молодец!" oninput="saveAll()">
        </div>
        <div class="field" style="display:flex; align-items:center; gap:10px;">
          <input type="checkbox" id="chkLatex" style="width:auto; height:18px; cursor:pointer;" onchange="saveAll()">
          <label for="chkLatex" style="margin:0; cursor:pointer;">Включить формулы (LaTeX)</label>
        </div>
      </div>

      <div class="section">
        <div class="section-title" style="display:flex; justify-content:space-between;">
          <span>Вопросы <span id="qCount" style="color:#fff;">(0/5)</span></span>
          <button class="btn-primary" style="padding:4px 8px; font-size:12px;" id="btnAddQ" onclick="openModal(null)">+ Добавить</button>
        </div>
        <div id="qList"></div>
      </div>
    </div>
    
    <div class="panel-footer">
      <div class="export-box">
        <button class="btn-primary" onclick="window.open($('outLink').value, '_blank')">▶ Играть</button>
        <input type="text" id="outLink" readonly onclick="this.select()">
        <button class="btn-outline" onclick="copyIframe()" title="Скопировать код для Genially">&lt;/&gt;</button>
      </div>
      <button class="btn-outline btn-danger" style="width: 100%; margin-top: 5px;" onclick="resetAll()">🗑 Сбросить все настройки и вопросы</button>
    </div>
  </div>

  <div class="preview">
    <div class="preview-wrapper">
      <div class="preview-badge">Предпросмотр (16:9 как в Genially)</div>
      <iframe id="previewFrame"></iframe>
    </div>
  </div>
</div>

<div class="modal-overlay" id="qModal">
  <div class="modal">
    <div class="modal-hdr">
      <span id="modalTitle">Редактирование вопроса</span>
      <button class="btn-outline" style="border:none; padding:5px;" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-col" style="border-right:1px solid var(--border); padding-right:20px;">
        <div class="field">
          <label>Текст вопроса (будет НАД картинкой)</label>
          <textarea id="modQText" rows="3"></textarea>
        </div>
        <div class="field">
          <label>URL картинки (появится ПОД текстом)</label>
          <input type="text" id="modQImg" placeholder="https://...">
        </div>
        <div class="field">
          <label>Тип ответа</label>
          <select id="modQType" onchange="toggleQType()">
            <option value="choice">Выбор вариантов</option>
            <option value="input">Ввод текста</option>
          </select>
        </div>
        
        <div id="modChoiceArea">
          <label style="font-size:13px; color:#a9b6e6; display:block; margin-bottom:10px;">Варианты (отметьте верный)</label>
          <div id="modOpts"></div>
          <button class="btn-outline" style="width:100%; border-style:dashed;" onclick="addModalOpt()">+ Добавить вариант</button>
        </div>
        
        <div id="modInputArea" style="display:none;">
          <label style="font-size:13px; color:#a9b6e6; display:block; margin-bottom:10px;">Правильный ответ (для проверки)</label>
          <input type="text" id="modInputAns" placeholder="Например: 15">
          <div style="font-size:11px; color:var(--muted); margin-top:5px;">*Регистр букв и пробелы игнорируются при проверке.</div>
        </div>
      </div>
      
      <div class="modal-col">
        <div class="section-title" style="margin-bottom:10px;">Дизайн блока</div>
        <div class="color-row">
          <label>Фон плашки</label>
          <input type="color" id="modBgColor" value="#ffffff">
        </div>
        <div class="color-row">
          <label>Цвет текста</label>
          <input type="color" id="modTextColor" value="#333333">
        </div>
        <div class="color-row">
          <label>Обводка</label>
          <input type="color" id="modBorderColor" value="#cccccc">
        </div>
        <div class="color-row">
          <label>Шрифт текста</label>
          <select id="modFont">
            <option value="system-ui">Стандартный</option>
            <option value="'Caveat', cursive">Caveat</option>
            <option value="'Neucha', cursive">Neucha</option>
            <option value="Arial">Arial</option>
            <option value="Courier New">Courier New</option>
          </select>
        </div>
        <div class="color-row">
          <label>Размер текста</label>
          <input type="number" id="modFontSize" value="22">
        </div>

        <div class="section-title" style="margin:20px 0 10px;">Дизайн кнопок / ввода</div>
        <div class="color-row">
          <label>Фон</label>
          <input type="color" id="modBtnBg" value="#ff7e67">
        </div>
        <div class="color-row">
          <label>Цвет текста</label>
          <input type="color" id="modBtnText" value="#ffffff">
        </div>
        <div class="color-row">
          <label>Шрифт</label>
          <select id="modBtnFont">
            <option value="system-ui">Стандартный</option>
            <option value="'Caveat', cursive">Caveat</option>
            <option value="'Neucha', cursive">Neucha</option>
            <option value="Arial">Arial</option>
          </select>
        </div>
      </div>
    </div>
    
    <div class="modal-ftr">
      <button class="btn-outline btn-danger" onclick="clearModalFields()">Очистить поля</button>
      <div style="display: flex; gap: 10px;">
        <button class="btn-outline" onclick="applySettingsToAll()">Применить всем</button>
        <button class="btn-primary" onclick="saveModal()">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<script>
  // --- ЗАПУСК ---
  const uid = () => Math.random().toString(36).substr(2, 6);
  const $ = id => document.getElementById(id);
  
  // Ключ сохранений
  const SAVE_KEY = "pinata_save_final_v1";
  
  let Editor = {
    title: "Праздничная Пиньята", useLatex: false,
    instText: "Ответь на 5 вопросов правильно, чтобы разбить пиньяту и получить сюрприз!",
    winText: "Молодец!",
    questions: [
      {
        id: uid(), q: "Решите уравнение: 2 + x = 4", img: "", type: "choice", options: ["1", "2", "3"], correctIdx: 1, inputText: "",
        style: { bg: "#ffffff", text: "#333333", border: "#cccccc", font: "system-ui", size: 22, btnBg: "#ff7e67", btnText: "#ffffff", btnFont: "system-ui" }
      }
    ]
  };

  const urlParams = new URLSearchParams(window.location.search);
  const cfgParam = urlParams.get('cfg');
  const playParam = urlParams.get('play');

  if (cfgParam) {
    try {
      // ИСПОЛЬЗУЕМ LZSTRING (ЧТОБЫ РАБОТАЛО В GENIALLY БЕЗ ОШИБОК)
      const raw = JSON.parse(LZString.decompressFromEncodedURIComponent(cfgParam));
      if (playParam === '1') {
        document.open();
        document.write(buildGameHTML(raw));
        document.close();
      } else {
        Editor = Object.assign(Editor, raw);
        initEditor();
      }
    } catch(e) {
      document.body.innerHTML = '<h2 style="color:red;text-align:center;margin-top:50px;">Ошибка загрузки игры</h2>';
    }
  } else {
    initEditor();
  }

  // --- ИНИЦИАЛИЗАЦИЯ И СБРОС ---
  function initEditor() {
    try { 
      const saved = localStorage.getItem(SAVE_KEY); 
      if(saved) {
          const parsed = JSON.parse(saved);
          if (parsed && Array.isArray(parsed.questions)) {
              Editor = parsed;
          }
      }
    } catch(e){}
    
    $("inpTitle").value = Editor.title || "Праздничная Пиньята";
    $("inpInst").value = Editor.instText || "Ответь на 5 вопросов правильно...";
    $("inpWin").value = Editor.winText || "Молодец!";
    $("chkLatex").checked = !!Editor.useLatex;
    renderQList();
    saveAll();
  }

  function resetAll() {
      if(confirm("Вы уверены, что хотите удалить ВСЕ вопросы и сбросить настройки? Это действие нельзя отменить!")) {
          localStorage.removeItem(SAVE_KEY);
          location.href = window.location.pathname; // Убираем параметры, перезапускаем
      }
  }

  function renderQList() {
    const list = $("qList"); list.innerHTML = "";
    Editor.questions.forEach((q, i) => {
      const item = document.createElement("div"); item.className = "q-item";
      item.innerHTML = `
        <div class="q-item-title" onclick="openModal('${q.id}')">${i+1}. ${q.q || 'Пустой вопрос'}</div>
        <div class="q-item-actions">
          <button class="btn-outline" onclick="openModal('${q.id}')">✏️</button>
          <button class="btn-outline btn-danger" onclick="delQ('${q.id}')">🗑</button>
        </div>
      `;
      list.appendChild(item);
    });
    $("qCount").innerText = `(${Editor.questions.length}/5)`;
    $("btnAddQ").style.display = Editor.questions.length >= 5 ? "none" : "block";
  }

  // --- MODAL LOGIC ---
  let editingId = null;

  function openModal(id) {
    editingId = id;
    $("modOpts").innerHTML = "";
    
    let q;
    if (id) {
      q = Editor.questions.find(x => x.id === id);
      $("modalTitle").innerText = "Редактирование вопроса";
    } else {
      const baseStyle = Editor.questions.length > 0 ? {...Editor.questions[0].style} : { bg: "#ffffff", text: "#333333", border: "#cccccc", font: "system-ui", size: 22, btnBg: "#ff7e67", btnText: "#ffffff", btnFont: "system-ui" };
      q = { q: "", img: "", type: "choice", options: ["", ""], correctIdx: 0, inputText: "", style: baseStyle };
      $("modalTitle").innerText = "Новый вопрос";
    }

    $("modQText").value = q.q || "";
    $("modQImg").value = q.img || "";
    $("modQType").value = q.type || "choice";
    $("modInputAns").value = q.inputText || "";
    
    (q.options || []).forEach((opt, idx) => addModalOpt(opt, idx === (q.correctIdx || 0)));
    
    const st = q.style || {};
    $("modBgColor").value = st.bg || "#ffffff";
    $("modTextColor").value = st.text || "#333333";
    $("modBorderColor").value = st.border || "#cccccc";
    $("modFont").value = st.font || "system-ui";
    $("modFontSize").value = st.size || 22;
    $("modBtnBg").value = st.btnBg || "#ff7e67";
    $("modBtnText").value = st.btnText || "#ffffff";
    $("modBtnFont").value = st.btnFont || "system-ui";

    toggleQType();
    $("qModal").classList.add("active");
  }

  function toggleQType() {
    const isChoice = $("modQType").value === "choice";
    $("modChoiceArea").style.display = isChoice ? "block" : "none";
    $("modInputArea").style.display = isChoice ? "none" : "block";
  }

  function addModalOpt(val = "", isCorrect = false) {
    const div = document.createElement("div"); div.className = "opt-row";
    div.innerHTML = `
      <input type="radio" name="modOptCorrect" ${isCorrect ? 'checked' : ''}>
      <input type="text" class="modOptVal" value="${val.replace(/"/g, '&quot;')}">
      <button class="btn-outline btn-danger" onclick="this.parentElement.remove()">✕</button>
    `;
    $("modOpts").appendChild(div);
  }

  function clearModalFields() {
    $("modQText").value = "";
    $("modQImg").value = "";
    $("modInputAns").value = "";
    $("modOpts").innerHTML = "";
    addModalOpt("", true);
    addModalOpt("", false);
  }

  function saveModal() {
    const qText = $("modQText").value.trim();
    if(!qText && !$("modQImg").value.trim()) return alert("Введите вопрос или добавьте картинку!");
    
    const type = $("modQType").value;
    let options = [], correctIdx = 0, inputText = "";
    
    if (type === "choice") {
      const rows = document.querySelectorAll("#modOpts .opt-row");
      if(rows.length < 2) return alert("Нужно минимум 2 варианта!");
      let hasCorrect = false;
      rows.forEach((row, idx) => {
        options.push(row.querySelector(".modOptVal").value.trim());
        if(row.querySelector('input[type="radio"]').checked) { correctIdx = idx; hasCorrect = true; }
      });
      if(!hasCorrect) return alert("Выберите правильный вариант!");
    } else {
      inputText = $("modInputAns").value.trim();
      if(!inputText) return alert("Введите правильный ответ для проверки!");
    }

    const newQ = {
      id: editingId || uid(), q: qText, img: $("modQImg").value.trim(), type, options, correctIdx, inputText,
      style: {
        bg: $("modBgColor").value, text: $("modTextColor").value, border: $("modBorderColor").value,
        font: $("modFont").value, size: $("modFontSize").value, btnBg: $("modBtnBg").value, btnText: $("modBtnText").value, btnFont: $("modBtnFont").value
      }
    };

    if (editingId) {
      const idx = Editor.questions.findIndex(x => x.id === editingId);
      Editor.questions[idx] = newQ;
    } else {
      if(Editor.questions.length >= 5) return alert("Максимум 5 вопросов!");
      Editor.questions.push(newQ);
    }

    closeModal();
    renderQList();
    saveAll();
  }

  function applySettingsToAll() {
    if(!confirm("Применить текущие цвета и шрифты ко всем вопросам?")) return;
    const style = {
      bg: $("modBgColor").value, text: $("modTextColor").value, border: $("modBorderColor").value,
      font: $("modFont").value, size: $("modFontSize").value, btnBg: $("modBtnBg").value, btnText: $("modBtnText").value, btnFont: $("modBtnFont").value
    };
    Editor.questions.forEach(q => { q.style = {...style}; });
    saveAll();
    alert("Дизайн скопирован на все вопросы!");
  }

  function closeModal() { $("qModal").classList.remove("active"); }
  function delQ(id) { Editor.questions = Editor.questions.filter(q => q.id !== id); renderQList(); saveAll(); }

  // --- SAVE & PREVIEW ---
  let debounceTimer;
  function saveAll() {
    Editor.title = $("inpTitle").value;
    Editor.instText = $("inpInst").value;
    Editor.winText = $("inpWin").value;
    Editor.useLatex = $("chkLatex").checked;
    
    $("uiTitleText").innerText = Editor.title || "Пиньята";

    // 100% надежное сохранение в кэш
    localStorage.setItem(SAVE_KEY, JSON.stringify(Editor));
    
    // Генерация ссылки
    const comp = LZString.compressToEncodedURIComponent(JSON.stringify(Editor));
    const link = window.location.origin + window.location.pathname + "?play=1&cfg=" + comp;
    $("outLink").value = link;
    
    // Обновление превью
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        $("previewFrame").srcdoc = buildGameHTML(Editor);
    }, 400);
  }

  function copyIframe() { navigator.clipboard.writeText(`<iframe src="${$("outLink").value}" width="100%" height="600" frameborder="0" allowfullscreen></iframe>`).then(() => alert("Код Iframe скопирован!")); }

  // --- GAME BUILDER ---
  function buildGameHTML(cfg) {
    return `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\${cfg.title}</title>
    \${cfg.useLatex ? '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"><script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"><\\/script>' : ''}
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Neucha&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; background-image: url('bg (2).png'); background-size: cover; background-position: center; background-repeat: no-repeat; }
        .game-logo { position: absolute; top: 20px; right: 20px; max-height: 80px; max-width: 150px; z-index: 100; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); object-fit: contain; }
        
        #startOverlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; text-align: center; padding: 20px; }
        #startOverlay h1 { color: #d6b14a; font-family: 'Caveat', cursive; font-size: 4rem; margin: 0 0 10px; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #startOverlay p { color: #fff; font-size: 1.2rem; max-width: 500px; line-height: 1.5; margin-bottom: 30px; }
        #startOverlay button { font-size: 1.2rem; padding: 15px 40px; border-radius: 30px; cursor: pointer; background: #d6b14a; color: #000; border: none; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 15px rgba(214,177,74,0.4); }
        #startOverlay button:hover { transform: scale(1.05); }

        /* КООРДИНАТЫ ПИНЬЯТЫ ЗАФИКСИРОВАНЫ */
        #piniata-wrapper { position: absolute; width: 310px; left: 68.35%; top: 54.59%; transform: translate(-50%, -50%); z-index: 10; display: none; }
        .piniata-image { width: 100%; height: auto; display: block; transform-origin: 50% 0%; cursor: pointer; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.3)); }
        
        .swing { animation: swingAnim 4s ease-in-out infinite; }
        @keyframes swingAnim { 0% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } 100% { transform: rotate(-6deg); } }
        .hit-anim { animation: hitAnim 0.2s ease-out; }
        @keyframes hitAnim { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(0.9) rotate(15deg) translateY(-10px); } 100% { transform: scale(1) rotate(0deg); } }

        /* ПАНЕЛЬ ВОПРОСОВ */
        #quiz-panel { position: absolute; left: 4%; top: 50%; transform: translateY(-50%); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 340px; max-height: 85vh; overflow-y: auto; text-align: center; z-index: 1000; display: none; flex-direction: column; gap: 15px; }
        
        /* ПОРЯДОК: ТЕКСТ НАД КАРТИНКОЙ */
        #question-text-game { font-weight: bold; line-height: 1.3; }
        #q-img { max-width: 100%; border-radius: 10px; display: none; margin: 0 auto; max-height: 160px; object-fit: contain; }
        
        .option-btn { display: block; width: 100%; padding: 12px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .option-btn:hover { filter: brightness(0.9); transform: translateY(-2px); }
        .option-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .input-wrapper { display: flex; flex-direction: column; gap: 10px; }
        .input-field { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid rgba(0,0,0,0.1); font-size: 16px; outline: none; text-align: center; font-weight: bold; }
        
        #feedback-text-game { font-size: 18px; font-weight: bold; min-height: 24px; }

        #win-message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: bold; color: #ffca3a; text-shadow: 4px 4px 0px #ff595e, 8px 8px 15px rgba(0,0,0,0.5); display: none; z-index: 100; text-transform: uppercase; text-align: center; }
        .confetti { position: absolute; top: -20px; z-index: 90; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

<div id="game-container">
    <img src="logo.png" class="game-logo" onerror="this.style.display='none'">
    
    <div id="startOverlay">
        <h1>\${cfg.title}</h1>
        <p>\${cfg.instText}</p>
        <button id="btnStartGame">Начать игру</button>
    </div>

    <div id="quiz-panel" style="display:none;">
        <div id="question-text-game"></div>
        <img id="q-img">
        <div id="options-container"></div>
        <div id="feedback-text-game"></div>
    </div>

    <div id="win-message">\${cfg.winText}</div>
    
    <div id="piniata-wrapper">
        <img class="piniata-image swing" id="piniata-img" src="1.png" alt="Пиньята">
    </div>
</div>

<script>
    const cfg = \${JSON.stringify(cfg)};
    
    let baseQs = cfg.questions && cfg.questions.length > 0 ? cfg.questions : [{ q: "Вопросов нет", type: "choice", options: ["Ок"], correctIdx: 0, style: { bg:"#fff", text:"#000", border:"#ccc", font:"system-ui", size:22, btnBg:"#ccc", btnText:"#000", btnFont:"system-ui" } }];
    const gameQs = [];
    for (let i = 0; i < 5; i++) gameQs.push(baseQs[i % baseQs.length]);
    
    const images = ['1.png', '2.png', '112.png', '3.png', '4.png', '5.png'];
    let currentStage = 0;
    let canHit = false;
    let audioCtx = null;

    const btnStart = document.getElementById("btnStartGame");
    const overlay = document.getElementById("startOverlay");
    const piniataImg = document.getElementById("piniata-img");
    const piniataWrapper = document.getElementById("piniata-wrapper");
    const quizPanel = document.getElementById("quiz-panel");
    const qImg = document.getElementById("q-img");
    const qText = document.getElementById("question-text-game");
    const optContainer = document.getElementById("options-container");
    const feedbackText = document.getElementById("feedback-text-game");
    const winMessage = document.getElementById("win-message");

    btnStart.onclick = () => {
        overlay.style.display = 'none';
        piniataWrapper.style.display = 'block';
        quizPanel.style.display = 'flex';
        loadQuestion();
    };

    function playHitSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(130, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function renderLatex(el, text) {
        if(cfg.useLatex && window.katex) { try { katex.render(text, el, {throwOnError: false}); } catch(e) { el.innerText = text; } } 
        else { el.innerText = text; }
    }

    function loadQuestion() {
        if (currentStage >= 5) return;
        
        const currentQ = gameQs[currentStage];
        const st = currentQ.style;
        
        quizPanel.style.backgroundColor = st.bg || '#ffffff';
        quizPanel.style.border = '2px solid ' + (st.border || '#cccccc');
        qText.style.color = st.text || '#333333';
        qText.style.fontFamily = st.font || 'system-ui';
        qText.style.fontSize = (st.size || 22) + 'px';
        
        renderLatex(qText, currentQ.q);
        
        if (currentQ.img) { qImg.src = currentQ.img; qImg.style.display = 'block'; } 
        else { qImg.style.display = 'none'; }
        
        optContainer.innerHTML = ''; 
        feedbackText.innerText = ''; 
        canHit = false;

        if (currentQ.type === "choice") {
            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button'); 
                btn.className = 'option-btn'; 
                renderLatex(btn, opt);
                btn.style.backgroundColor = st.btnBg || '#ff7e67';
                btn.style.color = st.btnText || '#ffffff';
                btn.style.fontFamily = st.btnFont || 'system-ui';
                
                btn.onclick = () => checkChoice(index, currentQ.correctIdx, btn);
                optContainer.appendChild(btn);
            });
        } else {
            const wrap = document.createElement('div'); wrap.className = 'input-wrapper';
            const inp = document.createElement('input'); inp.type = 'text'; inp.className = 'input-field'; inp.placeholder = 'Ваш ответ...';
            inp.style.fontFamily = st.btnFont || 'system-ui';
            
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = 'ОТВЕТИТЬ';
            btn.style.backgroundColor = st.btnBg || '#ff7e67'; btn.style.color = st.btnText || '#ffffff'; btn.style.fontFamily = st.btnFont || 'system-ui';
            
            btn.onclick = () => checkInput(inp.value, currentQ.inputText, btn, inp);
            inp.onkeydown = (e) => { if(e.key === 'Enter') btn.click(); };
            
            wrap.appendChild(inp); wrap.appendChild(btn);
            optContainer.appendChild(wrap);
            setTimeout(() => inp.focus(), 100);
        }
    }

    function checkChoice(selectedIndex, correctIndex, btnElement) {
        if (canHit) return;
        if (selectedIndex === correctIndex) {
            handleCorrect(btnElement);
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true); 
        } else { handleWrong(btnElement); }
    }

    function checkInput(userVal, correctVal, btnElement, inpElement) {
        if (canHit) return;
        const clean = (str) => (str||'').toString().toLowerCase().replace(/\\s+/g, '');
        if (clean(userVal) === clean(correctVal)) {
            handleCorrect(btnElement);
            inpElement.disabled = true; btnElement.disabled = true;
            inpElement.style.borderColor = '#28a745';
        } else { handleWrong(btnElement); }
    }

    function handleCorrect(btn) {
        feedbackText.innerText = "Правильно! Ударь пиньяту!"; 
        feedbackText.style.color = '#28a745'; 
        canHit = true; 
        btn.style.backgroundColor = '#28a745'; btn.style.color = '#fff';
    }

    function handleWrong(btn) {
        feedbackText.innerText = "Промахнулся! Попробуй еще раз."; 
        feedbackText.style.color = '#d9381e';
        btn.style.transform = 'translateX(-5px)'; 
        setTimeout(() => btn.style.transform = 'translateX(5px)', 50); 
        setTimeout(() => btn.style.transform = 'translateX(0)', 100);
    }

    piniataImg.addEventListener('click', () => {
        if (!canHit) { 
            if(feedbackText.innerText === "") { 
                feedbackText.innerText = "Сначала ответь на вопрос!"; 
                feedbackText.style.color = '#d9381e'; 
            } 
            return; 
        }
        
        playHitSound();
        
        piniataImg.classList.remove('swing'); 
        piniataImg.classList.add('hit-anim');
        
        currentStage++;
        
        setTimeout(() => { 
            piniataImg.classList.remove('hit-anim'); 
            if (currentStage < 5) piniataImg.classList.add('swing'); 
        }, 200);
        
        piniataImg.src = images[currentStage];
        
        if (currentStage === 5) { 
            quizPanel.style.display = 'none'; 
            winMessage.style.display = 'block'; 
            launchConfetti(); 
        } else { 
            setTimeout(loadQuestion, 500); 
        }
    });

    function launchConfetti() {
        const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#ff924c'];
        const cont = document.getElementById('game-container');
        for (let i = 0; i < 120; i++) {
            const piece = document.createElement('div'); piece.className = 'confetti';
            const size = 8 + Math.random() * 10; piece.style.width = size + 'px'; piece.style.height = (size * 1.5) + 'px';
            piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            piece.style.left = Math.random() * 100 + 'vw'; piece.style.animationDuration = (Math.random() * 3 + 2) + 's'; piece.style.animationDelay = (Math.random() * 1.5) + 's';
            cont.appendChild(piece);
        }
    }
<\/script>
</body>
</html>`;
  }
</script>
</body>
</html>
